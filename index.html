<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>WanFx Ledger</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#080b0f" />
<link rel="apple-touch-icon" href="icon-192.png" />
<script src="config.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#080b0f;--card:#101720;--card2:#151e28;--line:#263241;--text:#f0ede6;--muted:#939ba8;--gold:#d5ae28;--green:#50e28a;--red:#ff6570;--blue:#54b9ff;--orange:#ff9b45}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#12202b 0,#080b0f 35%,#05070a 100%);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}button{cursor:pointer}.wrap{max-width:980px;margin:auto;padding:22px 16px 90px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#f4d66b,#b88913);display:grid;place-items:center;color:#080b0f;font-weight:900}.title h1{margin:0;font-size:28px;letter-spacing:.4px}.title p{margin:3px 0 0;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-size:12px}.iconbtn,.btn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:11px 14px}.iconbtn{width:48px;height:48px}.hero{margin:26px 0}.label{color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-size:12px}.balance{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:48px;font-weight:900;letter-spacing:1px;margin:8px 0}.profit{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--green);font-size:18px}.stats{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--line);border-radius:20px;overflow:hidden;background:var(--card);margin:18px 0}.stat{padding:18px;text-align:center;border-right:1px solid var(--line)}.stat:last-child{border-right:0}.stat b{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:22px}.stat span{display:block;color:var(--muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:7px}.grid{display:grid;grid-template-columns:1.3fr .7fr;gap:18px}.card{background:rgba(16,23,32,.9);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.22)}.chart{height:220px;position:relative}.chart svg{width:100%;height:100%}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.muted{color:var(--muted)}.log{margin-top:24px}.day{background:var(--card);border:1px solid var(--line);border-radius:18px;margin:10px 0;overflow:hidden}.dayhead{width:100%;border:0;background:transparent;color:var(--text);display:flex;justify-content:space-between;align-items:center;padding:16px;text-align:left}.daybody{border-top:1px solid var(--line);display:none}.day.open .daybody{display:block}.trade{padding:14px 16px;border-top:1px solid rgba(255,255,255,.06)}.tag{font-size:11px;padding:3px 7px;border-radius:7px;font-weight:800}.buy{color:var(--blue);background:rgba(84,185,255,.12)}.sell{color:var(--orange);background:rgba(255,155,69,.12)}.win{color:var(--green);background:rgba(80,226,138,.12)}.loss{color:var(--red);background:rgba(255,101,112,.12)}.fab{position:fixed;right:24px;bottom:24px;width:68px;height:68px;border-radius:50%;border:0;background:var(--gold);color:#080b0f;font-size:38px;box-shadow:0 12px 35px rgba(213,174,40,.35);z-index:5}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:flex-end;z-index:20}.modal.show{display:flex}.sheet{width:100%;max-width:980px;margin:auto;background:#090f15;border:1px solid var(--line);border-radius:24px 24px 0 0;padding:20px;max-height:88vh;overflow:auto}.fields{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.field label{display:block;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;font-size:11px;margin-bottom:6px}.field input,.field textarea,.field select{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--text);border-radius:12px;padding:12px}.field textarea{min-height:80px}.primary{background:var(--gold);color:#080b0f;border:0;border-radius:13px;padding:14px 18px;font-weight:900}.danger{color:var(--red)}.cloud{border:1px solid var(--line);border-radius:16px;padding:14px;background:#0e151d;margin-top:12px}.pill{display:inline-block;border-radius:20px;background:#1c2632;padding:6px 10px;color:var(--muted);font-size:12px}table{width:100%;border-collapse:collapse}td,th{padding:9px;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;text-align:left}.hide{display:none!important}@media(max-width:740px){.wrap{padding:20px 14px 90px}.balance{font-size:38px}.grid{grid-template-columns:1fr}.fields{grid-template-columns:1fr}.stat{padding:14px 8px}.title h1{font-size:26px}}
</style>
</head><body>
<div class="wrap">
  <div class="top"><div class="brand"><div id="logo" class="logo">WFX</div><div class="title"><h1 id="appName">WanFx Ledger</h1><p id="subtitle">EA Trade Journal</p></div></div><button class="iconbtn" onclick="openSettings()">⚙️</button></div>
  <div class="hero"><div class="label">Balance</div><div id="balance" class="balance">$0.00</div><div id="totalProfit" class="profit">+$0.00 daripada modal</div></div>
  <div class="stats"><div class="stat"><b id="winRate" style="color:var(--gold)">-</b><span>Win Rate</span></div><div class="stat"><b id="drawdown" style="color:var(--red)">-</b><span>Drawdown</span></div><div class="stat"><b id="tradeCount" style="color:var(--blue)">0</b><span>Trades</span></div></div>
  <div class="grid"><div class="card"><div class="label">Equity Curve</div><div class="chart"><svg id="chart" viewBox="0 0 800 220" preserveAspectRatio="none"></svg></div></div><div class="card"><div class="label">Cloud Sync</div><p id="cloudText" class="muted">Belum login</p><button class="btn" onclick="loginGoogle()">Login Google</button><button class="btn" onclick="logoutGoogle()">Logout</button><div style="height:10px"></div><button class="primary" onclick="uploadLocalToCloud()">Upload Local ke Cloud</button><div style="height:10px"></div><button class="btn" onclick="downloadCloud()">Download Cloud</button></div></div>
  <div class="log"><div class="row"><div class="label">Trade Log</div><button class="btn" onclick="openImport()">Import MT5</button></div><div id="tradeLog"></div></div>
</div>
<button class="fab" onclick="openAdd()">+</button>

<div id="addModal" class="modal"><div class="sheet"><div class="row"><h2>Tambah Trade</h2><button class="btn" onclick="closeAdd()">✕</button></div><div class="fields">
 <div class="field"><label>Tarikh</label><input id="fDate" type="date"></div><div class="field"><label>EA Name</label><input id="fEa" placeholder="Asia Breakout V1"></div><div class="field"><label>Symbol</label><input id="fSymbol" value="XAUUSD"></div><div class="field"><label>Type</label><select id="fType"><option value="buy">BUY</option><option value="sell">SELL</option></select></div><div class="field"><label>Lot</label><input id="fLot" type="number" step="any" placeholder="0.01"></div><div class="field"><label>Profit / Loss</label><input id="fProfit" type="number" step="any" placeholder="12.50 / -5"></div><div class="field"><label>Entry</label><input id="fEntry" type="number" step="any"></div><div class="field"><label>Close</label><input id="fClose" type="number" step="any"></div><div class="field"><label>Result</label><select id="fResult"><option value="win">WIN</option><option value="loss">LOSS</option><option value="open">OPEN</option></select></div><div class="field"><label>Ticket</label><input id="fTicket"></div><div class="field" style="grid-column:1/-1"><label>Nota</label><textarea id="fNote" placeholder="Kenapa entry, setting EA, apa perlu improve..."></textarea></div></div><br><button class="primary" onclick="saveManualTrade()">Simpan Trade</button></div></div>

<div id="settingsModal" class="modal"><div class="sheet"><div class="row"><h2>Settings</h2><button class="btn" onclick="closeSettings()">✕</button></div><div class="fields"><div class="field"><label>Nama App</label><input id="sName"></div><div class="field"><label>Subtitle</label><input id="sSubtitle"></div><div class="field"><label>Logo Text</label><input id="sLogo"></div><div class="field"><label>Starting Balance</label><input id="sBalance" type="number" step="any"></div></div><div class="cloud"><div class="label">Firebase</div><p id="settingsCloud" class="muted">Belum connect</p><button class="btn" onclick="loginGoogle()">Login Google</button> <button class="btn" onclick="logoutGoogle()">Logout</button> <button class="primary" onclick="uploadLocalToCloud()">Upload Local ke Cloud</button> <button class="btn" onclick="downloadCloud()">Download Cloud</button></div><br><button class="primary" onclick="saveSettings()">Simpan</button> <button class="btn" onclick="installApp()">Add to Home Screen</button> <button class="btn" onclick="exportJson()">Export JSON</button> <button class="btn danger" onclick="clearAll()">Clear Local</button></div></div>

<div id="importModal" class="modal"><div class="sheet"><div class="row"><h2>Import MT5 Report</h2><button class="btn" onclick="closeImport()">✕</button></div><p class="muted">Upload report HTML/CSV. Import boleh Replace atau Merge.</p><input type="file" id="importFile" accept=".html,.htm,.csv,.txt"><br><br><button class="primary" onclick="importMt5('replace')">Replace Data</button> <button class="btn" onclick="importMt5('merge')">Merge Data</button><div id="importPreview"></div></div></div>

<script>
let trades=[];let settings={name:'WanFx Ledger',subtitle:'EA Trade Journal',logo:'WFX',startingBalance:25000};let user=null;let db=null;let unsub=null;let deferredPrompt=null;
function money(n){const s=n>=0?'+':'';return s+'$'+Math.abs(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtMoney(n){const sign=n<0?'-':'';return sign+'$'+Math.abs(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
function today(){return new Date().toISOString().slice(0,10)}
function loadLocal(){try{trades=JSON.parse(localStorage.getItem('wanfx_trades_v2')||'[]')}catch(e){trades=[]}try{settings={...settings,...JSON.parse(localStorage.getItem('wanfx_settings_v2')||'{}')}}catch(e){}}
function saveLocal(){localStorage.setItem('wanfx_trades_v2',JSON.stringify(trades));localStorage.setItem('wanfx_settings_v2',JSON.stringify(settings));render()}
function calc(){const sorted=[...trades].sort((a,b)=>(a.date||'').localeCompare(b.date||''));let bal=Number(settings.startingBalance)||0,peak=bal,maxdd=0,wins=0,closed=0;let curve=[bal];for(const t of sorted){const p=Number(t.profit)||0;bal+=p;peak=Math.max(peak,bal);maxdd=Math.max(maxdd,peak?((peak-bal)/peak*100):0);if(t.result!=='open'){closed++; if(p>0)wins++}curve.push(bal)}return{bal,total:bal-(Number(settings.startingBalance)||0),maxdd,winRate:closed?wins/closed*100:null,count:trades.length,curve}}
function render(){document.getElementById('appName').textContent=settings.name;document.getElementById('subtitle').textContent=settings.subtitle;document.getElementById('logo').textContent=settings.logo;const c=calc();document.getElementById('balance').textContent=fmtMoney(c.bal);document.getElementById('totalProfit').textContent=money(c.total)+' ('+((settings.startingBalance?c.total/settings.startingBalance*100:0).toFixed(2))+'%) daripada modal';document.getElementById('totalProfit').style.color=c.total>=0?'var(--green)':'var(--red)';document.getElementById('winRate').textContent=c.winRate==null?'-':c.winRate.toFixed(0)+'%';document.getElementById('drawdown').textContent='-'+c.maxdd.toFixed(1)+'%';document.getElementById('tradeCount').textContent=c.count;drawChart(c.curve);renderLog();updateCloudText()}
function drawChart(curve){const svg=document.getElementById('chart');if(!curve.length){svg.innerHTML='';return}const min=Math.min(...curve),max=Math.max(...curve),span=max-min||1;const pts=curve.map((v,i)=>{const x=i*(800/(curve.length-1||1));const y=200-((v-min)/span)*170;return[x,y]});const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');const area=line+' L800 210 L0 210 Z';svg.innerHTML='<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d5ae28" stop-opacity=".42"/><stop offset="1" stop-color="#d5ae28" stop-opacity="0"/></linearGradient></defs><path d="'+area+'" fill="url(#g)"/><path d="'+line+'" fill="none" stroke="#d5ae28" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+pts.at(-1)[0]+'" cy="'+pts.at(-1)[1]+'" r="7" fill="#d5ae28"/>'}
function renderLog(){const el=document.getElementById('tradeLog');if(!trades.length){el.innerHTML='<p class="muted">Belum ada trade.</p>';return}const by={};[...trades].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).forEach(t=>{(by[t.date||'No date']??=[]).push(t)});el.innerHTML=Object.keys(by).map((d,i)=>{const list=by[d],sum=list.reduce((s,t)=>s+(Number(t.profit)||0),0);return '<div class="day '+(i<2?'open':'')+'"><button class="dayhead" onclick="this.parentElement.classList.toggle(\'open\')"><div><b>'+d+'</b><div class="muted">'+list.length+' trades</div></div><b style="color:'+(sum>=0?'var(--green)':'var(--red)')+'">'+money(sum)+'</b></button><div class="daybody">'+list.map(t=>'<div class="trade"><div class="row"><div><b>'+(t.symbol||'XAUUSD')+'</b> <span class="tag '+(t.type||'buy')+'">'+(t.type||'buy').toUpperCase()+'</span> <span class="tag '+(Number(t.profit)>=0?'win':'loss')+'">'+(Number(t.profit)>=0?'WIN':'LOSS')+'</span></div><button class="btn danger" onclick="deleteTrade(\''+t.id+'\')">Delete</button></div><table><tr><td>EA</td><td>'+(t.ea||'-')+'</td><td>Lot</td><td>'+(t.lot||'-')+'</td></tr><tr><td>Entry</td><td>'+(t.entry||'-')+'</td><td>Close</td><td>'+(t.close||'-')+'</td></tr><tr><td>Profit</td><td>'+(money(Number(t.profit)||0))+'</td><td>Ticket</td><td>'+(t.ticket||'-')+'</td></tr></table><div class="muted">'+(t.note||'')+'</div></div>').join('')+'</div></div>'}).join('')}
function openAdd(){document.getElementById('fDate').value=today();document.getElementById('addModal').classList.add('show')}function closeAdd(){document.getElementById('addModal').classList.remove('show')}function openSettings(){document.getElementById('sName').value=settings.name;document.getElementById('sSubtitle').value=settings.subtitle;document.getElementById('sLogo').value=settings.logo;document.getElementById('sBalance').value=settings.startingBalance;document.getElementById('settingsModal').classList.add('show');updateCloudText()}function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}function openImport(){document.getElementById('importModal').classList.add('show')}function closeImport(){document.getElementById('importModal').classList.remove('show')}
function saveManualTrade(){const t={id:'m_'+Date.now(),date:fDate.value||today(),ea:fEa.value.trim(),symbol:fSymbol.value.trim().toUpperCase()||'XAUUSD',type:fType.value,lot:Number(fLot.value)||0,profit:Number(fProfit.value)||0,entry:fEntry.value,close:fClose.value,result:fResult.value,ticket:fTicket.value,note:fNote.value.trim(),source:'manual'};trades.push(t);saveLocal();syncTrade(t);closeAdd()}
function saveSettings(){settings.name=sName.value||'WanFx Ledger';settings.subtitle=sSubtitle.value||'EA Trade Journal';settings.logo=sLogo.value||'WFX';settings.startingBalance=Number(sBalance.value)||0;saveLocal();syncSettings();closeSettings()}function deleteTrade(id){trades=trades.filter(t=>t.id!==id);saveLocal();if(user&&db)db.collection('users').doc(user.uid).collection('trades').doc(id).delete().catch(alert)}
function initFirebase(){if(!window.firebaseConfig||!window.firebase){console.warn('Firebase not ready');return}try{firebase.initializeApp(window.firebaseConfig);db=firebase.firestore();firebase.auth().onAuthStateChanged(u=>{user=u;updateCloudText(); if(u) listenCloud();});}catch(e){console.error(e);alert('Firebase error: '+e.message)}}
function loginGoogle(){if(!firebase?.auth){alert('Firebase belum load. Refresh page.');return}const provider=new firebase.auth.GoogleAuthProvider();firebase.auth().signInWithPopup(provider).catch(e=>{console.error(e);alert('Login gagal: '+e.message)})}
function logoutGoogle(){firebase.auth().signOut()}function updateCloudText(){const txt=user?('Connected: '+(user.email||user.uid)):'Belum connect';['cloudText','settingsCloud'].forEach(id=>{const x=document.getElementById(id);if(x)x.textContent=txt})}
function listenCloud(){if(unsub)unsub();unsub=db.collection('users').doc(user.uid).collection('trades').onSnapshot(snap=>{let cloud=[];snap.forEach(d=>cloud.push(d.data()));if(cloud.length){trades=cloud;localStorage.setItem('wanfx_trades_v2',JSON.stringify(trades));render()}});db.collection('users').doc(user.uid).collection('settings').doc('main').get().then(doc=>{if(doc.exists){settings={...settings,...doc.data()};localStorage.setItem('wanfx_settings_v2',JSON.stringify(settings));render()}})}
function syncTrade(t){if(user&&db)db.collection('users').doc(user.uid).collection('trades').doc(t.id).set(t,{merge:true}).catch(e=>alert('Sync trade gagal: '+e.message))}function syncSettings(){if(user&&db)db.collection('users').doc(user.uid).collection('settings').doc('main').set(settings,{merge:true}).catch(e=>alert('Sync settings gagal: '+e.message))}
function uploadLocalToCloud(){if(!user||!db){alert('Login Google dulu');return}Promise.all(trades.map(t=>db.collection('users').doc(user.uid).collection('trades').doc(t.id).set(t,{merge:true}))).then(()=>syncSettings()).then(()=>alert('Local data dah upload ke cloud')).catch(e=>alert(e.message))}
function downloadCloud(){if(!user||!db){alert('Login Google dulu');return}listenCloud();alert('Cloud sync aktif')}
function parseCsv(text){const rows=text.split(/\r?\n/).filter(Boolean).map(r=>r.split(/,(?=(?:[^\"]*\"[^\"]*\")*[^\"]*$)/).map(c=>c.replace(/^"|"$/g,'').trim()));const head=rows.shift().map(h=>h.toLowerCase());return rows.map((r,i)=>rowToTrade(Object.fromEntries(head.map((h,j)=>[h,r[j]||''])),i)).filter(Boolean)}
function parseHtml(text){
  const doc=new DOMParser().parseFromString(text,'text/html');
  const trs=[...doc.querySelectorAll('tr')];
  let out=[];
  trs.forEach((tr,i)=>{
    const cells=[...tr.children].map(td=>td.textContent.trim()).filter(Boolean);
    if(cells.length<8) return;
    const raw=cells.join(' ');
    const joined=raw.toLowerCase();
    if(!/(buy|sell)/i.test(joined)) return;
    if(!/xau|gold|btc|usd|eur|gbp|jpy|nas|us30/i.test(joined)) return;
    const nums=cells.map(x=>Number(String(x).replace(/[, ]/g,''))).filter(n=>!isNaN(n));
    const profit=nums.length ? nums[nums.length-1] : 0;
    out.push({
      id:'i_'+Date.now()+'_'+i,
      date:guessDate(raw),
      ea:'Imported MT5',
      symbol:guessSymbol(raw),
      type:/sell/i.test(joined)?'sell':'buy',
      lot:guessLot(cells),
      profit,
      entry:'',
      close:'',
      result:profit>=0?'win':'loss',
      ticket:cells[0]||'',
      note:'Imported HTML',
      source:'mt5-html'
    });
  });
  return dedupe(out);
}
function guessDate(s){const m=s.match(/\d{4}[.\/-]\d{2}[.\/-]\d{2}/)||s.match(/\d{2}[.\/-]\d{2}[.\/-]\d{4}/);if(!m)return today();let x=m[0].replace(/[.]/g,'-');if(/^\d{2}-/.test(x)){const [d,mo,y]=x.split('-');return y+'-'+mo+'-'+d}return x.slice(0,10)}function guessSymbol(s){const m=s.match(/\b(XAUUSD|GOLD|BTCUSD|US30|NAS100|EURUSD|GBPUSD|USDJPY)\b/i);return m?m[1].toUpperCase():'XAUUSD'}function guessLot(arr){for(const c of arr){const n=Number(String(c).replace(',','.'));if(n>0&&n<100)return n}return ''}
function rowToTrade(o,i){const symbol=o.symbol||o.pair||o['']||o.market||guessSymbol(Object.values(o).join(' '));const profit=Number((o.profit||o.pnl||o['profit/loss']||o.p_l||0).replace?.(/[, ]/g,'')||0);const type=(o.type||o.side||o.direction||'buy').toLowerCase().includes('sell')?'sell':'buy';return{id:'c_'+Date.now()+'_'+i,date:(o.date||o['close time']||o.time||today()).slice(0,10).replace(/[.]/g,'-'),ea:o.ea||'Imported MT5',symbol,type,lot:Number(o.lot||o.size||o.volume)||'',profit,entry:o.entry||o['open price']||'',close:o.close||o['close price']||'',result:profit>=0?'win':'loss',ticket:o.ticket||o.order||'',note:'Imported CSV',source:'mt5-csv'}}function dedupe(a){const seen=new Set();return a.filter(t=>{const k=(t.ticket||'')+'_'+t.date+'_'+t.profit+'_'+t.symbol;if(seen.has(k))return false;seen.add(k);return true})}
function importMt5(mode){const file=document.getElementById('importFile').files[0];if(!file){alert('Pilih file dulu');return}const r=new FileReader();r.onload=e=>{const text=e.target.result;let imported=file.name.toLowerCase().endsWith('.csv')?parseCsv(text):parseHtml(text);if(!imported.length){alert('Tak jumpa trade dalam file. Cuba Detailed Report HTML.');return}trades=mode==='replace'?imported:[...trades,...imported];saveLocal();if(user)uploadLocalToCloud();document.getElementById('importPreview').innerHTML='<p class="muted">Imported '+imported.length+' trades.</p>';closeImport()};r.readAsText(file)}
function exportJson(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify({settings,trades},null,2)],{type:'application/json'}));a.download='wanfx-ledger-backup.json';a.click()}function clearAll(){if(confirm('Clear local data? Cloud tidak dipadam.')){localStorage.removeItem('wanfx_trades_v2');localStorage.removeItem('wanfx_settings_v2');trades=[];settings={name:'WanFx Ledger',subtitle:'EA Trade Journal',logo:'WFX',startingBalance:25000};render()}}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}else alert('Kalau button tak keluar, guna Chrome menu ⋮ > Install app / Add to Home screen')}
window.addEventListener('load',()=>{loadLocal();render();setTimeout(initFirebase,500);if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{})});
</script>
</body></html>
